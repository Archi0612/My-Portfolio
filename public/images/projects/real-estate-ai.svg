<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" role="img" aria-label="Real Estate AI Automation">
  <defs>
    <linearGradient id="re-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1408"/>
      <stop offset="100%" stop-color="#1a1024"/>
    </linearGradient>
    <linearGradient id="re-accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#7c5cff"/>
    </linearGradient>
  </defs>
  <rect width="800" height="320" fill="url(#re-bg)"/>
  <g opacity="0.1" stroke="#f59e0b" stroke-width="0.5" fill="none">
    <path d="M0 0 L800 320 M800 0 L0 320"/>
  </g>
  <!-- n8n workflow nodes -->
  <g font-family="ui-monospace, monospace" font-size="10">
    <g transform="translate(80,140)">
      <rect width="100" height="60" rx="10" fill="#0a0f1c" stroke="#f59e0b" stroke-width="1.5"/>
      <text x="50" y="26" text-anchor="middle" fill="#f59e0b" font-size="11" font-weight="700">Lead In</text>
      <text x="50" y="42" text-anchor="middle" fill="#8b97a7">webhook</text>
    </g>
    <g transform="translate(230,90)">
      <rect width="120" height="60" rx="10" fill="#0a0f1c" stroke="#7c5cff" stroke-width="1.5"/>
      <text x="60" y="26" text-anchor="middle" fill="#7c5cff" font-size="11" font-weight="700">AI Agent</text>
      <text x="60" y="42" text-anchor="middle" fill="#8b97a7">match · rank</text>
    </g>
    <g transform="translate(230,180)">
      <rect width="120" height="60" rx="10" fill="#0a0f1c" stroke="#22d3ee" stroke-width="1.5"/>
      <text x="60" y="26" text-anchor="middle" fill="#22d3ee" font-size="11" font-weight="700">Summarize</text>
      <text x="60" y="42" text-anchor="middle" fill="#8b97a7">LLM notes</text>
    </g>
    <g transform="translate(400,140)">
      <rect width="120" height="60" rx="10" fill="#0a0f1c" stroke="#d946ef" stroke-width="1.5"/>
      <text x="60" y="26" text-anchor="middle" fill="#d946ef" font-size="11" font-weight="700">Insights</text>
      <text x="60" y="42" text-anchor="middle" fill="#8b97a7">enrich CRM</text>
    </g>
    <g transform="translate(570,140)">
      <rect width="160" height="60" rx="10" fill="#0a0f1c" stroke="#10b981" stroke-width="1.5"/>
      <text x="80" y="26" text-anchor="middle" fill="#10b981" font-size="11" font-weight="700">Property Match</text>
      <text x="80" y="42" text-anchor="middle" fill="#8b97a7">recommend · notify</text>
    </g>
  </g>
  <g stroke="#3a2f1a" stroke-width="1.5" fill="none">
    <path d="M180 170 L230 120"/>
    <path d="M180 170 L230 210"/>
    <path d="M350 120 L400 170"/>
    <path d="M350 210 L400 170"/>
    <path d="M520 170 L570 170"/>
  </g>
  <text x="60" y="56" font-family="ui-sans-serif, system-ui" font-size="22" font-weight="700" fill="url(#re-accent)">Real Estate AI Automation</text>
  <text x="60" y="78" font-family="ui-monospace, monospace" font-size="12" fill="#a78bfa">n8n · AI agents · workflow automation</text>
</svg>
