<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" role="img" aria-label="Speaknova">
  <defs>
    <linearGradient id="sn-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#140c26"/>
      <stop offset="100%" stop-color="#0c1420"/>
    </linearGradient>
    <linearGradient id="sn-accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7c5cff"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <radialGradient id="sn-glow" cx="30%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7c5cff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#7c5cff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="320" fill="url(#sn-bg)"/>
  <rect width="800" height="320" fill="url(#sn-glow)"/>
  <!-- Voice waveform -->
  <g transform="translate(60,160)" fill="none" stroke="#22d3ee" stroke-width="2" stroke-linecap="round">
    <line x1="0" y1="-20" x2="0" y2="20"/>
    <line x1="12" y1="-32" x2="12" y2="32"/>
    <line x1="24" y1="-12" x2="24" y2="12"/>
    <line x1="36" y1="-44" x2="36" y2="44" stroke="#7c5cff"/>
    <line x1="48" y1="-24" x2="48" y2="24"/>
    <line x1="60" y1="-36" x2="60" y2="36" stroke="#7c5cff"/>
    <line x1="72" y1="-16" x2="72" y2="16"/>
    <line x1="84" y1="-40" x2="84" y2="40" stroke="#7c5cff"/>
    <line x1="96" y1="-24" x2="96" y2="24"/>
    <line x1="108" y1="-32" x2="108" y2="32"/>
    <line x1="120" y1="-12" x2="120" y2="12"/>
    <line x1="132" y1="-36" x2="132" y2="36" stroke="#7c5cff"/>
    <line x1="144" y1="-20" x2="144" y2="20"/>
    <line x1="156" y1="-44" x2="156" y2="44"/>
    <line x1="168" y1="-16" x2="168" y2="16"/>
  </g>
  <!-- Tenant cards -->
  <g transform="translate(330,110)" font-family="ui-monospace, monospace" font-size="10">
    <g>
      <rect width="170" height="44" rx="10" fill="#0a0f1c" stroke="#22324a"/>
      <circle cx="22" cy="22" r="10" fill="#22d3ee" opacity="0.7"/>
      <text x="42" y="20" fill="#e6edf3" font-weight="600">Tenant · Acme</text>
      <text x="42" y="34" fill="#8b97a7">Vapi · Stripe Pro</text>
    </g>
    <g transform="translate(0,52)">
      <rect width="170" height="44" rx="10" fill="#0a0f1c" stroke="#22324a"/>
      <circle cx="22" cy="22" r="10" fill="#7c5cff" opacity="0.7"/>
      <text x="42" y="20" fill="#e6edf3" font-weight="600">Tenant · Nimbus</text>
      <text x="42" y="34" fill="#8b97a7">Retell · Stripe Biz</text>
    </g>
    <g transform="translate(0,104)">
      <rect width="170" height="44" rx="10" fill="#0a0f1c" stroke="#22324a"/>
      <circle cx="22" cy="22" r="10" fill="#10b981" opacity="0.7"/>
      <text x="42" y="20" fill="#e6edf3" font-weight="600">Tenant · Aurora</text>
      <text x="42" y="34" fill="#8b97a7">Vapi + Retell</text>
    </g>
  </g>
  <!-- Stripe billing card -->
  <g transform="translate(540,130)">
    <rect width="200" height="100" rx="14" fill="#0a0f1c" stroke="#7c5cff" stroke-width="1.5"/>
    <text x="18" y="28" font-family="ui-monospace, monospace" font-size="11" fill="#7c5cff" font-weight="700">SUBSCRIPTION</text>
    <text x="18" y="52" font-family="ui-sans-serif, system-ui" font-size="20" font-weight="700" fill="#e6edf3">$ 1,240 MRR</text>
    <rect x="18" y="68" width="164" height="6" rx="3" fill="#22324a"/>
    <rect x="18" y="68" width="118" height="6" rx="3" fill="url(#sn-accent)"/>
    <text x="18" y="90" font-family="ui-monospace, monospace" font-size="10" fill="#8b97a7">Stripe billing · 50+ tenants</text>
  </g>
  <text x="60" y="56" font-family="ui-sans-serif, system-ui" font-size="22" font-weight="700" fill="url(#sn-accent)">Speaknova</text>
  <text x="60" y="78" font-family="ui-monospace, monospace" font-size="12" fill="#a78bfa">multi-tenant · Vapi · Retell · NestJS</text>
</svg>
