<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" role="img" aria-label="AI Artistry">
  <defs>
    <linearGradient id="ai-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#140c26"/>
      <stop offset="100%" stop-color="#1a1233"/>
    </linearGradient>
    <linearGradient id="ai-accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7c5cff"/>
      <stop offset="100%" stop-color="#d946ef"/>
    </linearGradient>
    <radialGradient id="ai-glow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#d946ef" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#d946ef" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="320" fill="url(#ai-bg)"/>
  <rect width="800" height="320" fill="url(#ai-glow)"/>
  <g opacity="0.18" stroke="#7c5cff" stroke-width="0.5" fill="none">
    <circle cx="400" cy="160" r="50"/><circle cx="400" cy="160" r="90"/>
    <circle cx="400" cy="160" r="130"/><circle cx="400" cy="160" r="170"/>
  </g>
  <!-- Prompt window -->
  <g transform="translate(60,90)">
    <rect width="320" height="140" rx="14" fill="#0a0f1c" stroke="#2b1f4a" stroke-width="1"/>
    <circle cx="20" cy="20" r="5" fill="#ff6b6b"/>
    <circle cx="38" cy="20" r="5" fill="#fbbf24"/>
    <circle cx="56" cy="20" r="5" fill="#34d399"/>
    <text x="20" y="60" font-family="ui-monospace, monospace" font-size="13" fill="#d946ef">prompt:</text>
    <text x="20" y="84" font-family="ui-monospace, monospace" font-size="13" fill="#e6edf3">"neon city at dusk,</text>
    <text x="20" y="104" font-family="ui-monospace, monospace" font-size="13" fill="#e6edf3"> synthwave skyline"</text>
    <rect x="20" y="116" width="160" height="14" rx="3" fill="url(#ai-accent)" opacity="0.7"/>
  </g>
  <!-- Generated image preview -->
  <g transform="translate(420,90)">
    <rect width="320" height="140" rx="14" fill="#0a0f1c" stroke="#2b1f4a" stroke-width="1"/>
    <defs>
      <linearGradient id="art" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="#7c5cff"/>
        <stop offset="50%" stop-color="#d946ef"/>
        <stop offset="100%" stop-color="#f59e0b"/>
      </linearGradient>
    </defs>
    <rect x="10" y="10" width="300" height="120" rx="8" fill="url(#art)" opacity="0.85"/>
    <g stroke="#fff" stroke-opacity="0.35" stroke-width="1" fill="none">
      <path d="M30 100 L80 60 L130 90 L180 50 L240 80 L290 40"/>
      <circle cx="240" cy="35" r="10" fill="#fff" fill-opacity="0.6" stroke="none"/>
    </g>
  </g>
  <text x="60" y="56" font-family="ui-sans-serif, system-ui" font-size="22" font-weight="700" fill="url(#ai-accent)">AI Artistry</text>
  <text x="60" y="78" font-family="ui-monospace, monospace" font-size="12" fill="#a78bfa">text→image · Stability API · MERN</text>
</svg>
