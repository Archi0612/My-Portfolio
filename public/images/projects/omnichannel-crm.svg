<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" role="img" aria-label="Omnichannel CRM">
  <defs>
    <linearGradient id="oc-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a1820"/>
      <stop offset="100%" stop-color="#0e2030"/>
    </linearGradient>
    <linearGradient id="oc-accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
  </defs>
  <rect width="800" height="320" fill="url(#oc-bg)"/>
  <g opacity="0.15" stroke="#22d3ee" stroke-width="0.5" fill="none">
    <path d="M0 60 H800"/><path d="M0 120 H800"/><path d="M0 180 H800"/><path d="M0 240 H800"/>
  </g>
  <!-- Central CRM hub -->
  <g transform="translate(340,130)">
    <circle r="50" fill="#0a0f1c" stroke="#22d3ee" stroke-width="2"/>
    <text x="0" y="-2" text-anchor="middle" font-family="ui-sans-serif, system-ui" font-size="14" font-weight="700" fill="#22d3ee">CRM</text>
    <text x="0" y="18" text-anchor="middle" font-family="ui-monospace, monospace" font-size="9" fill="#8b97a7">core</text>
  </g>
  <!-- Channel nodes -->
  <g font-family="ui-monospace, monospace" font-size="10" fill="#e6edf3">
    <g transform="translate(120,90)">
      <circle r="32" fill="#0a0f1c" stroke="#22d3ee" stroke-width="1.5"/>
      <text text-anchor="middle" y="-4" font-size="11" fill="#22d3ee">SMS</text>
      <text text-anchor="middle" y="10" fill="#8b97a7">Twilio</text>
    </g>
    <g transform="translate(120,200)">
      <circle r="32" fill="#0a0f1c" stroke="#7c5cff" stroke-width="1.5"/>
      <text text-anchor="middle" y="-4" font-size="11" fill="#7c5cff">Email</text>
      <text text-anchor="middle" y="10" fill="#8b97a7">M365·GSuite</text>
    </g>
    <g transform="translate(620,90)">
      <circle r="32" fill="#0a0f1c" stroke="#10b981" stroke-width="1.5"/>
      <text text-anchor="middle" y="-4" font-size="11" fill="#10b981">WA</text>
      <text text-anchor="middle" y="10" fill="#8b97a7">WhatsApp</text>
    </g>
    <g transform="translate(620,200)">
      <circle r="32" fill="#0a0f1c" stroke="#f59e0b" stroke-width="1.5"/>
      <text text-anchor="middle" y="-4" font-size="11" fill="#f59e0b">Kafka</text>
      <text text-anchor="middle" y="10" fill="#8b97a7">events</text>
    </g>
  </g>
  <!-- Connections -->
  <g stroke="#22324a" stroke-width="1.2" fill="none" stroke-dasharray="3 4">
    <path d="M152 90 L340 145"/>
    <path d="M152 200 L340 170"/>
    <path d="M588 90 L440 145"/>
    <path d="M588 200 L440 170"/>
  </g>
  <text x="60" y="46" font-family="ui-sans-serif, system-ui" font-size="22" font-weight="700" fill="url(#oc-accent)">Omnichannel CRM</text>
  <text x="60" y="68" font-family="ui-monospace, monospace" font-size="12" fill="#8b97a7">Next.js monorepo · Kafka microservices · RBAC</text>
</svg>
