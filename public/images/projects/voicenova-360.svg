<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" role="img" aria-label="VoiceNova 360">
  <defs>
    <linearGradient id="vn-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a1a18"/>
      <stop offset="100%" stop-color="#0c1626"/>
    </linearGradient>
    <linearGradient id="vn-accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
  </defs>
  <rect width="800" height="320" fill="url(#vn-bg)"/>
  <g opacity="0.12" stroke="#10b981" stroke-width="0.5" fill="none">
    <circle cx="200" cy="200" r="40"/><circle cx="200" cy="200" r="80"/><circle cx="200" cy="200" r="120"/>
  </g>
  <!-- Phone with voice -->
  <g transform="translate(140,110)">
    <rect width="120" height="180" rx="20" fill="#0a0f1c" stroke="#10b981" stroke-width="1.5"/>
    <rect x="10" y="14" width="100" height="120" rx="6" fill="#06120f"/>
    <text x="60" y="40" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" fill="#10b981" font-weight="700">CALL ACTIVE</text>
    <circle cx="60" cy="80" r="22" fill="none" stroke="#22d3ee" stroke-width="2"/>
    <path d="M52 76 Q60 86 68 76" fill="none" stroke="#22d3ee" stroke-width="2"/>
    <text x="60" y="118" text-anchor="middle" font-family="ui-monospace, monospace" font-size="9" fill="#8b97a7">"book tuesday 3pm"</text>
    <circle cx="60" cy="156" r="14" fill="#10b981"/>
    <rect x="56" y="150" width="8" height="12" fill="#06120f" rx="2"/>
  </g>
  <!-- Calendar -->
  <g transform="translate(340,110)">
    <rect width="220" height="180" rx="14" fill="#0a0f1c" stroke="#22324a"/>
    <rect width="220" height="32" rx="14" fill="#22d3ee" opacity="0.15"/>
    <text x="14" y="22" font-family="ui-sans-serif, system-ui" font-size="13" font-weight="700" fill="#22d3ee">JUN 2026</text>
    <g font-family="ui-monospace, monospace" font-size="9" fill="#8b97a7">
      <text x="22" y="50">M</text><text x="52" y="50">T</text><text x="82" y="50">W</text>
      <text x="112" y="50">T</text><text x="142" y="50">F</text><text x="172" y="50">S</text><text x="200" y="50">S</text>
    </g>
    <g fill="#22324a">
      <rect x="14" y="60" width="24" height="20" rx="3"/>
      <rect x="44" y="60" width="24" height="20" rx="3"/>
      <rect x="74" y="60" width="24" height="20" rx="3"/>
      <rect x="104" y="60" width="24" height="20" rx="3"/>
      <rect x="134" y="60" width="24" height="20" rx="3"/>
      <rect x="164" y="60" width="24" height="20" rx="3"/>
      <rect x="194" y="60" width="24" height="20" rx="3"/>
    </g>
    <rect x="44" y="86" width="24" height="20" rx="3" fill="#10b981"/>
    <text x="56" y="100" text-anchor="middle" font-family="ui-monospace, monospace" font-size="9" fill="#06120f" font-weight="700">3p</text>
    <g font-family="ui-monospace, monospace" font-size="9" fill="#e6edf3">
      <text x="14" y="130">10:00  ✓ booked via voice</text>
      <text x="14" y="148">15:00  ✓ booked via voice</text>
      <text x="14" y="166">17:30  → followup queued</text>
    </g>
  </g>
  <!-- Webhook arrow -->
  <g stroke="#22d3ee" stroke-width="1.5" fill="none" stroke-dasharray="4 4">
    <path d="M260 200 L340 200"/>
  </g>
  <!-- Supabase tag -->
  <g transform="translate(600,180)">
    <rect width="140" height="60" rx="10" fill="#0a0f1c" stroke="#10b981" stroke-width="1.5"/>
    <text x="70" y="26" text-anchor="middle" font-family="ui-monospace, monospace" font-size="11" fill="#10b981" font-weight="700">SUPABASE</text>
    <text x="70" y="44" text-anchor="middle" font-family="ui-monospace, monospace" font-size="9" fill="#8b97a7">webhooks · sync</text>
  </g>
  <text x="60" y="56" font-family="ui-sans-serif, system-ui" font-size="22" font-weight="700" fill="url(#vn-accent)">VoiceNova 360</text>
  <text x="60" y="78" font-family="ui-monospace, monospace" font-size="12" fill="#8b97a7">AI voice booking · calendar sync · webhooks</text>
</svg>
